    <style>
      /* Apply smooth scrolling behavior */
      html {
        scroll-behavior: smooth;
      }
      /* Define custom fonts and colors */
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F5F0E6; /* Aged paper white */
        color: #3E352A; /* Wet earth brown */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;

      h1, h2, h3, h4, h5, h6, .font-heading {

      }
      .bg-base { background-color: #F5F0E6; }

      .bg-accent { background-color: #B89A6E; }

      .border-accent { border-color: #B89A6E; }
      .bg-detail { background-color: #8C7B6B; }
      .text-detail { color: #8C7B6B; }
      .bg-stone { background-color: #57534E; } /* Volcanic stone gray */
      .text-stone { color: #57534E; } /* Volcanic stone gray */
      .border-stone { border-color: #57534E; } /* Volcanic stone gray */

      /* Custom Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.7s ease-out forwards;
      }
    </style>
