    <style>
      /* ─── Design Tokens — Inner Spirit Palette (Enhanced) ─── */
      :root {
        --sand-dune:   #EAE0CC;  /* warm airy cream — base background */
        --almond-silk: #C9ADA1;  /* dusty rose/terracotta — accent */
        --dry-sage:    #8B9A8B;  /* richer sage green — secondary */
        --grey-olive:  #5C6B5C;  /* deeper olive — structure */
        --deep-teal:   #2D4A4D;  /* darker teal — CTA */
        --blue-slate:  #4D6A6D;  /* original teal-grey — CTA */
        --ink:         #1A1A18;  /* darker ink — text */
        --cream-light: #FAF7F2;  /* off-white sections */
        --warm-black:  #121210;  /* footer/hero background */
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--sand-dune);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      h1, h2, h3, h4, h5, h6, .font-heading {
        font-family: 'Cormorant Garamond', serif;
      }

      /* ─── Utility classes ─── */
      .bg-base        { background-color: var(--sand-dune); }
      .text-base-text { color: var(--ink); }

      .bg-accent      { background-color: var(--almond-silk); }
      .text-accent    { color: var(--almond-silk); }
      .border-accent  { border-color: var(--almond-silk); }

      .bg-sage        { background-color: var(--dry-sage); }
      .text-sage      { color: var(--dry-sage); }

      .bg-olive       { background-color: var(--grey-olive); }
      .text-olive     { color: var(--grey-olive); }

      .bg-slate-is    { background-color: var(--blue-slate); }
      .text-slate-is  { color: var(--blue-slate); }
      .border-slate-is { border-color: var(--blue-slate); }

      /* Legacy aliases kept for backward compat */
      .bg-detail      { background-color: var(--dry-sage); }
      .text-detail    { color: var(--dry-sage); }
      .bg-stone-is    { background-color: var(--grey-olive); }
      .text-stone-is  { color: var(--grey-olive); }

      /* Hover utilities */
      .hover\:text-accent:hover   { color: var(--almond-silk); }
      .hover\:bg-accent:hover     { background-color: var(--almond-silk); }
      .hover\:border-accent:hover { border-color: var(--almond-silk); }
      .hover\:text-slate-is:hover { color: var(--blue-slate); }

      /* Tint helpers */
      .bg-accent\/10  { background-color: rgba(201,173,161,0.10); }
      .bg-accent\/20  { background-color: rgba(201,173,161,0.20); }
      .ring-accent    { --tw-ring-color: var(--almond-silk); }

      /* Dark backgrounds */
      .bg-ink         { background-color: var(--ink); }
      .bg-deep-slate  { background-color: #1c2829; }   /* footer / hero */
      .bg-dark-panel  { background-color: #1f2c2e; }   /* event side panel */

      /* Cream sections */
      .bg-cream       { background-color: var(--cream-light); }
      .bg-sand-light  { background-color: #F3EDE2; }

      /* ─── Animations ─── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.7s ease-out forwards;
      }

      /* Ensure hero section is never overlapped */
      #inicio {
        isolation: isolate;
        position: relative;
        z-index: 1;
      }

      /* Skip Link for Accessibility */
      .skip-link {
        position: absolute;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--blue-slate);
        color: white;
        padding: 12px 24px;
        border-radius: 0 0 8px 8px;
        z-index: 10000;
        font-weight: 600;
        text-decoration: none;
        transition: top 0.3s ease;
      }
      
      .skip-link:focus {
        top: 0;
        outline: 3px solid var(--almond-silk);
        outline-offset: 2px;
      }
    </style>
